<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Warung Ganteng</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: white;
}

nav {
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

header {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

section {
    padding: 60px 20px;
    text-align: center;
}

.menu {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
}

footer {
    background: black;
    padding: 20px;
    text-align: center;
}
</style>

</head>
<body>

<nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#contact">Kontak</a>
</nav>

<header id="home">
    <div>
        <h1>Warung Ganteng</h1>
        <p>Makanan enak, harga santai, yang jual ganteng 😎</p>
    </div>
</header>

<section id="menu">
    <h2>Menu Favorit</h2>
    <div class="menu">
        <div class="card">
            <h3>Nasi Goreng</h3>
            <p>Rp 20.000</p>
        </div>
        <div class="card">
            <h3>Ayam Bakar</h3>
            <p>Rp 25.000</p>
        </div>
    </div>
</section>

<section id="contact">
    <h2>Kontak</h2>
    <p>📍 Bandung</p>
    <p>📞 0875xxxxxxx</p>
</section>

<footer>
    <p>© 2026 Warung Ganteng</p>
</footer>

</body>
</html>
