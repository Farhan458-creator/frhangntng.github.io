<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Warung Ganteng</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: white;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    color: orange;
}

/* HERO */
header {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1555992336-03a23c7b20ee') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

header h1 {
    font-size: 60px;
    letter-spacing: 2px;
}

header p {
    margin-top: 10px;
    color: #ddd;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 25px;
    background: orange;
    color: black;
    border-radius: 25px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: white;
}

/* SECTION */
section {
    padding: 70px 20px;
    text-align: center;
}
