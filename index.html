<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Warung Ganteng</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }
        header {
            background: url('https://images.unsplash.com/photo-1555992336-03a23c7b20ee') no-repeat center;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-shadow: 2px 2px 5px black;
        }
        header h1 {
            font-size: 50px;
            margin: 0;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        section {
            padding: 50px;
            text-align: center;
        }
        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .card {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
        }
        footer {
            background: black;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#contact">Kontak</a>
</nav>

<header id="home">
    <h1>Warung Ganteng</h1>
    <p>Makanan enak, harga terjangkau, yang jual ganteng</p>
</header>

<section id="menu">
    <h2>Menu Favorit</h2>
    <div class="menu">
        <div class="card">
            <h3>Nasi Goreng</h3>
            <p>Rp 20.000</p>
        </div>
        <div class="card">
            <h3>Ayam Bakar</h3>
            <p>Rp 25.000</p>
        </div>
        <div class="card">
            <h3>Sate Ayam</h3>
            <p>Rp 22.000</p>
        </div>
    </div>
</section>

<section id="contact">
    <h2>Kontak</h2>
    <p>📍 Bandung, Jawa Barat</p>
    <p>📞 087543245780</p>
</section>

<footer>
    <p>© 2026 Rasa Nusantara</p>
</footer>

</body>
</html>
